---
# NodeVault controlplane Deployment
#
# ⚠ 현재 미사용 — NodeVault는 seoy 호스트 바이너리로 실행 (K8s Pod 아님).
#   podbridge5(buildah) rootless 제약으로 K8s Pod 안에서 overlay 마운트가 불가능하다.
#   NodeVault가 in-cluster로 이동하는 경우에 이 파일을 사용한다.
#
# 현재 배포 방법: make deploy-infralab → 00-namespaces.yaml + 02-rbac.yaml만 적용.
#
# NODEVAULT_REGISTRY_ADDR: 빌드 결과를 push할 Harbor 레지스트리 주소.
# HARBOR_USER / HARBOR_PASS: Harbor 인증 정보 (nodevault-harbor-auth Secret에서 주입).
#
# in-cluster 실행 시 KUBECONFIG 불필요 — ServiceAccount token을 자동으로 사용한다.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodevault-controlplane
  namespace: nodevault-system
  labels:
    app: nodevault-controlplane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nodevault-controlplane
  template:
    metadata:
      labels:
        app: nodevault-controlplane
    spec:
      serviceAccountName: nodevault-controlplane
      imagePullSecrets:
        - name: harbor-pull-secret

      # overlay 마운트 + runc 실행을 위해 privileged 필요
      securityContext:
        runAsUser: 0

      containers:
        - name: nodevault
          # harbor.10.113.24.96.nip.io/nodevault/controlplane:latest
          # 이미지는 `make push-image` 또는 Skopeo로 Harbor에 push한다.
          image: harbor.10.113.24.96.nip.io/nodevault/controlplane:latest
          imagePullPolicy: Always

          ports:
            - name: grpc
              containerPort: 50051
              protocol: TCP

          env:
            - name: NODEVAULT_REGISTRY_ADDR
              value: "harbor.10.113.24.96.nip.io"
            # Harbor 인증 정보는 Secret에서 주입 (아래 nodevault-harbor-auth 참조)
            - name: HARBOR_USER
              valueFrom:
                secretKeyRef:
                  name: nodevault-harbor-auth
                  key: username
                  optional: true
            - name: HARBOR_PASS
              valueFrom:
                secretKeyRef:
                  name: nodevault-harbor-auth
                  key: password
                  optional: true

          securityContext:
            privileged: true
            allowPrivilegeEscalation: true

          volumeMounts:
            # 컨테이너 이미지 스토리지 — Pod 재시작 간 캐시 유지를 위해 emptyDir 사용
            - name: container-storage
              mountPath: /var/lib/containers
            # storage.conf 오버라이드 — runroot/graphRoot 명시 (containers/storage root 실행 시 필수)
            - name: storage-conf
              mountPath: /etc/containers/storage.conf
              subPath: storage.conf

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 2000m
              memory: 4Gi

          livenessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 10
            periodSeconds: 30

          readinessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 5
            periodSeconds: 10

      volumes:
        - name: container-storage
          emptyDir: {}
        - name: storage-conf
          configMap:
            name: nodevault-storage-conf
---
# NodeVault gRPC Service (ClusterIP)
# GRPCRoute가 이 Service를 backendRef로 참조한다.
apiVersion: v1
kind: Service
metadata:
  name: nodevault-controlplane
  namespace: nodevault-system
  labels:
    app: nodevault-controlplane
spec:
  selector:
    app: nodevault-controlplane
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
      protocol: TCP
---
# Harbor 인증 정보 Secret 템플릿 (실제 값은 kubectl create secret으로 생성)
#
# 생성 방법:
#   kubectl create secret generic nodevault-harbor-auth \
#     --from-literal=username=admin \
#     --from-literal=password=<harbor-admin-password> \
#     -n nodevault-system
#
# 아래는 참조용 구조만 명시한다 (민감 정보 미포함).
apiVersion: v1
kind: Secret
metadata:
  name: nodevault-harbor-auth
  namespace: nodevault-system
  annotations:
    # 실제 값은 kubectl create secret으로 생성할 것 — 이 파일을 git에 커밋하지 말 것
    note: "placeholder — 실제 secret은 kubectl로 생성 필요"
type: Opaque
stringData:
  username: "REPLACE_ME"
  password: "REPLACE_ME"
